name: Build and Deploy to ECS

on:
  push:
    branches: [ master ]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: url-shortener
  ECS_CLUSTER: url-shortener-cluster
  ECS_SERVICE: url-shortener-service
  CONTAINER_NAME: url-shortener

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests
        run: pytest app/tests/ -v
        # Pipeline stops here if any test fails

  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: test  # Only runs if test job passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build for linux/amd64 (ECS Fargate architecture)
          docker build --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update ECS service with new image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $CONTAINER_NAME \
            --query taskDefinition)

          # Update the image in the task definition
          NEW_TASK_DEF=$(echo $TASK_DEF | python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          td['containerDefinitions'][0]['image'] = \
            '$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG'
          # Remove fields that can't be in a new registration
          for key in ['taskDefinitionArn','revision','status',
                      'requiresAttributes','compatibilities',
                      'registeredAt','registeredBy']:
              td.pop(key, None)
          print(json.dumps(td))
          ")

          # Register new task definition revision
          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          # Update service to use new task definition
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition $NEW_TASK_ARN

          echo "Deployed task definition: $NEW_TASK_ARN"
          echo "Image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Wait for deployment to stabilise
        run: |
          echo "Waiting for service to stabilise..."
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE
          echo "Service stable ✓"

      - name: Verify deployment
        run: |
          # Get running task count
          RUNNING=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --query 'services[0].runningCount' \
            --output text)

          echo "Running tasks: $RUNNING"

          if [ "$RUNNING" -lt "1" ]; then
            echo "Deployment failed — no running tasks"
            exit 1
          fi

          echo "Deployment verified ✓ — $RUNNING task(s) running"

      - name: Post deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Image tag:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster:** $ECS_CLUSTER" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** $ECS_SERVICE" >> $GITHUB_STEP_SUMMARY
          echo "- **Region:** $AWS_REGION" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY